name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'APK/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'APK/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('APK/android/**/*.gradle.kts', 'APK/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: ./APK/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: ./APK/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        working-directory: ./APK/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jnet-player-apk
          path: |
            APK/android/app/build/outputs/apk/debug/*.apk
            APK/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Copy APKs to output folder
        run: |
          mkdir -p APK/output
          cp APK/android/app/build/outputs/apk/debug/*.apk APK/output/ 2>/dev/null || true
          cp APK/android/app/build/outputs/apk/release/*.apk APK/output/ 2>/dev/null || true
          ls -la APK/output/ 2>/dev/null || echo "APK build outputs:"
          ls -la APK/android/app/build/outputs/apk/ 2>/dev/null || true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: jnet-player-apk
          path: APK/output

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: APK/output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
